<form action="" autocomplete="off" onsubmit="return false;">
    <div class="top_btns top_btns_primary">
        <button type="button" class="btn btn-default btn-sm btn-block custom_default_btn" data-toggle="modal" data-target="#layouts-section-2">Select Layout</button>
        <button type="button" class="btn btn-default btn-sm btn-block custom_default_btn" data-toggle="modal" data-target="#grouts-section-2">Select Grout</button>
    </div>
    <div class="top_btns top_btns_secondary">
        <button type="button" class="btn btn-default btn-sm btn-block custom_default_btn filter-row-btn" data-toggle="modal" data-target="#filter-section-2">Filters</button>
        <button onclick="delete tile_datas['2'];delete tile_datas['2_'];render(vis_cvs);" type="button" class="btn btn-default btn-sm btn-block custom_default_btn clear-tiles-icon-btn" title="Clear Tiles" aria-label="Clear Tiles">
            <span class="btn-icon" aria-hidden="true">&#10227;</span>
        </button>
        <button style='display:none;' type="button" class="btn btn-default btn-sm btn-block custom_default_btn" data-toggle="modal" data-target="#model-section-2">3D Model</button>
    </div>
    <div class="clearfix"></div>
    <div class="checkbox">
        <div class="rotation">
            Rotate
            <select class="rotate-degree" data-tile-id="2">
                <option value="0">0</option>
                <option value="90">90</option>
            </select>
            <input onkeyup='searchKeyPress(2,this);' placeholder="Search by tile names" style='margin-left:17px;width:163px;padding:3px;border-radius:5px 5px 5px 5px;border:1px solid gray;'></input>
        </div>
    </div>
    <div class="clearfix"></div>
    <div class="filter_thumbs">
        <ul class="tiles-list" id='tiles-list-2'></ul>
    </div>
    <div class="clearfix"></div>
</form>
