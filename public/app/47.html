<script>
window.__targetTileType = 1;

$(document).on("click", ".js-target-brush", function() {
    var side = Number($(this).attr("data-side-target"));
    if (side) {
        window.__targetTileType = side;
    }
});

(function() {
    if (typeof window.selectTile !== "function" || window.__targetSelectTilePatched) {
        return;
    }
    window.__targetSelectTilePatched = true;

    var originalSelectTile = window.selectTile;
    window.selectTile = function(tiles) {
        if (tiles && tiles.length && window.__targetTileType) {
            tiles = tiles.map(function(tile) {
                if (!tile) {
                    return tile;
                }
                var clone = $.extend({}, tile);
                clone.tile_type = Number(window.__targetTileType);
                clone.fixed_tile_type = clone.tile_type - 1;
                return clone;
            });
        }
        return originalSelectTile(tiles);
    };
})();
</script>
<script>
$(function() {
    var panelsLoaded = { "1": false, "2": false };
    var apiInitTriggered = false;

    function tryInitApiTiles() {
        if (apiInitTriggered || !panelsLoaded["1"] || !panelsLoaded["2"]) {
            return;
        }
        apiInitTriggered = true;

        if (typeof window.initDynamicTilesFromApi === "function") {
            window.initDynamicTilesFromApi({
                roomId: 47
            }).then(function(result) {
                if (result) {
                    console.log("[dynamic-tiles-api] 47.html loaded", result);
                }
            });
        }
    }

    $("#roomsContainer").load("/app/modules/partials/room.html");

    $("#menuPanel1").load("/app/modules/partials/menu-panel-1.html", function() {
        if (typeof window.forceEnhanceVisualizerSidebar === "function") {
            window.forceEnhanceVisualizerSidebar(1);
        }
        if (typeof window.setVisualizerTilesLoading === "function") {
            window.setVisualizerTilesLoading(1);
        }
        $('.tile-type-label > img', this).each(function() {
            if (this.dataset && this.dataset.src) {
                this.src = this.dataset.src;
                delete this.dataset.src;
            }
        });
        if ($.fn.preloader) {
            $("#tiles-list-1").preloader();
        }
        panelsLoaded["1"] = true;
        tryInitApiTiles();
    });
