<script>
window.__wallTargetTileType = 1;
window.__wallTileTypes = [1, 3, 4];
window.__wallGroutByTileType = { 1: 1, 3: 1, 4: 1 };

function getWallSelectedTileIds(tileType) {
    var ids = [];
    var source = null;

    if (window.free_tiles && free_tiles[tileType] && free_tiles[tileType].length) {
        source = free_tiles[tileType];
    } else if (window.tile_datas && tile_datas[tileType] && tile_datas[tileType].length) {
        source = tile_datas[tileType];
    }

    if (!source) {
        return ids;
    }

    source.forEach(function(tile) {
        var id = Number(tile && tile.id);
        if (id && ids.indexOf(id) === -1) {
            ids.push(id);
        }
    });

    return ids;
}

function syncWallTileSelectionUi(tileType) {
    var $inputs = $('#menuPanel1 .tile-type-input');
    if (!$inputs.length) {
        return;
    }

    var selected = getWallSelectedTileIds(tileType);
    $inputs.prop('checked', false);

    if (!selected.length) {
        return;
    }

    $inputs.each(function() {
        if (selected.indexOf(Number(this.value)) !== -1) {
            this.checked = true;
        }
    });
}

function getGroutIdForTileType(tileType) {
    if (!(window.tile_datas && tile_datas[tileType] && tile_datas[tileType].length)) {
        return null;
    }

    var groutColor = String(tile_datas[tileType][0].grout_color || '').toLowerCase();
    if (!groutColor) {
        return null;
    }

    if (groutColor === 'rgba(0,0,0,0)') {
        return -1;
    }

    if (!window.colors) {
        return null;
    }

    var found = null;
    Object.keys(colors).some(function(id) {
        if (String(colors[id] || '').toLowerCase() === groutColor) {
            found = Number(id);
            return true;
        }
        return false;
    });

    return found;
}

function syncWallGroutModal(tileType) {
    var groutId = getGroutIdForTileType(tileType);
    if (groutId === null || groutId === undefined) {
        groutId = window.__wallGroutByTileType[tileType];
    }
    if (groutId === null || groutId === undefined) {
        groutId = 1;
    }

    window.__wallGroutByTileType[tileType] = Number(groutId);

    var radioSuffix = Number(groutId) === -1 ? 'null' : String(groutId);
    $('input[name="tile_grout_1"]').prop('checked', false);
    $('#tile_grout_1_' + radioSuffix).prop('checked', true);
}

function forceWallGroutRestore(tileType) {
    var groutId = window.__wallGroutByTileType[tileType];
    if (groutId === null || groutId === undefined || !window.__originalSelectGrout) {
        return;
    }

    window.__originalSelectGrout(tileType, Number(groutId), true);
    if (typeof window.render === 'function' && window.vis_cvs) {
        render(vis_cvs);
    }
}

function ensureWallLayoutStateInputs() {
    var $modal = $('#layouts-section-1');
    if (!$modal.length) {
        return;
    }

    var $form = $modal.find('form').first();
    var $visibleInputs = $modal.find('.layout-list .layout-type-input[data-room="1"]');
    if (!$form.length || !$visibleInputs.length) {
        return;
    }

    var $store = $modal.find('.js-layout-state-store');
    if (!$store.length) {
        $store = $('<div class="js-layout-state-store" style="display:none;"></div>');
        $form.append($store);
    }

    window.__wallTileTypes.forEach(function(tileType) {
        if ($store.find('.layout-type-input[data-room="1"][data-tile-id="' + tileType + '"]').length) {
            return;
        }

        $visibleInputs.each(function() {
            var $clone = $(this).clone();
            $clone.attr('id', 'layout-' + this.value + '-wall-store-' + tileType);
            $clone.attr('name', 'layout-type-store-' + tileType);
            $clone.attr('data-room', '1');
            $clone.attr('data-tile-id', String(tileType));
            $clone.prop('checked', this.value === 'grid');
            $store.append($clone);
        });
    });
}

function getVisibleLayoutValue() {
    return $('#layouts-section-1 .layout-list .layout-type-input[data-room="1"]:checked').val() || 'grid';
}

function syncVisibleLayoutToStore(tileType) {
    var layoutValue = getVisibleLayoutValue();
    var $storedGroup = $('#layouts-section-1 .js-layout-state-store .layout-type-input[data-room="1"][data-tile-id="' + tileType + '"]');
    if (!$storedGroup.length) {
        return;
    }

    $storedGroup.prop('checked', false);
    $storedGroup.filter('[value="' + layoutValue + '"]').prop('checked', true);
}

function setVisibleLayoutForWall(tileType) {
    var $storedGroup = $('#layouts-section-1 .js-layout-state-store .layout-type-input[data-room="1"][data-tile-id="' + tileType + '"]');
    var $storedChecked = $('#layouts-section-1 .js-layout-state-store .layout-type-input[data-room="1"][data-tile-id="' + tileType + '"]:checked');
    var selectedLayout = $storedChecked.val() || 'grid';
    if (selectedLayout === 'dragdrop') {
        $storedGroup.prop('checked', false);
        $storedGroup.filter('[value="grid"]').prop('checked', true);
        selectedLayout = 'grid';
    }
    var $visibleInputs = $('#layouts-section-1 .layout-list .layout-type-input[data-room="1"]');

    $visibleInputs.each(function() {
        this.checked = (this.value === selectedLayout);
        this.setAttribute('data-tile-id', String(tileType));
    });
}

function switchActiveWall(tileType) {
    ensureWallLayoutStateInputs();

    var prev = Number(window.__wallTargetTileType || 1);
    syncVisibleLayoutToStore(prev);

    window.__wallTargetTileType = Number(tileType || 1);
    setVisibleLayoutForWall(window.__wallTargetTileType);
    syncWallTileSelectionUi(window.__wallTargetTileType);
}

$(document).on('click', '.js-wall-brush', function() {
    var side = Number($(this).attr('data-side-target'));
    if (side) {
        switchActiveWall(side);
    }
});

$(document).on('show.bs.modal', '#layouts-section-1', function() {
    ensureWallLayoutStateInputs();
    setVisibleLayoutForWall(Number(window.__wallTargetTileType || 1));
});

$(document).on('change', '#layouts-section-1 .layout-list .layout-type-input[data-room="1"]', function() {
    var wallTarget = Number(window.__wallTargetTileType || 1);
    syncVisibleLayoutToStore(wallTarget);

    // Layout changes trigger async tile rebuild in script-2; restore wall grout after that settles.
    setTimeout(function() { forceWallGroutRestore(wallTarget); }, 0);
    setTimeout(function() { forceWallGroutRestore(wallTarget); }, 180);
    setTimeout(function() { forceWallGroutRestore(wallTarget); }, 450);
});

$(document).on('show.bs.modal', '#grouts-section-1', function() {
    syncWallGroutModal(Number(window.__wallTargetTileType || 1));
});

(function() {
    if (typeof window.selectGrout !== 'function' || window.__wallSelectGroutPatched) {
        return;
    }
    window.__wallSelectGroutPatched = true;

    var originalSelectGrout = window.selectGrout;
    window.__originalSelectGrout = originalSelectGrout;

    window.selectGrout = function(key, id, dont_render) {
        var resolvedKey = key;

        if (Number(key) === 1 && $('#grouts-section-1').is(':visible')) {
            resolvedKey = Number(window.__wallTargetTileType || 1);
        }

        var out = originalSelectGrout(resolvedKey, id, dont_render);

        if (window.__wallTileTypes.indexOf(Number(resolvedKey)) !== -1) {
            window.__wallGroutByTileType[Number(resolvedKey)] = Number(id);
            syncWallTileSelectionUi(Number(resolvedKey));
        }

        return out;
    };
})();

(function() {
    if (typeof window.selectTile !== 'function' || window.__wallSelectTilePatched) {
        return;
    }
    window.__wallSelectTilePatched = true;

    var originalSelectTile = window.selectTile;
    window.selectTile = function(tiles) {
        var wallTarget = Number(window.__wallTargetTileType || 1);
        var cachedGroutId = window.__wallGroutByTileType[wallTarget];
        var previousGroutId = (cachedGroutId === null || cachedGroutId === undefined)
            ? getGroutIdForTileType(wallTarget)
            : Number(cachedGroutId);

        if (tiles && tiles.length && wallTarget) {
            tiles = tiles.map(function(tile) {
                if (!tile || Number(tile.tile_type) !== 1) {
                    return tile;
                }
                var clone = $.extend({}, tile);
                clone.tile_type = wallTarget;
                clone.fixed_tile_type = wallTarget - 1;
                return clone;
            });
        }

        var out = originalSelectTile(tiles);

        if (previousGroutId !== null && previousGroutId !== undefined && window.__originalSelectGrout) {
            var applyGrout = function() {
                window.__originalSelectGrout(wallTarget, previousGroutId, true);
                window.__wallGroutByTileType[wallTarget] = Number(previousGroutId);
                if (typeof window.render === 'function' && window.vis_cvs) {
                    render(vis_cvs);
                }
            };

            applyGrout();
            setTimeout(applyGrout, 0);
            setTimeout(applyGrout, 120);
            setTimeout(applyGrout, 320);
            setTimeout(applyGrout, 650);
        }

        syncWallTileSelectionUi(wallTarget);
        return out;
    };
})();

$(function() {
    ensureWallLayoutStateInputs();

    window.__wallTileTypes.forEach(function(tileType) {
        var g = getGroutIdForTileType(tileType);
        if (g !== null && g !== undefined) {
            window.__wallGroutByTileType[tileType] = Number(g);
        } else if (window.__wallGroutByTileType[tileType] === null || window.__wallGroutByTileType[tileType] === undefined) {
            window.__wallGroutByTileType[tileType] = 1;
        }
    });

    setVisibleLayoutForWall(1);
    syncWallTileSelectionUi(1);
});
</script>
