<script>
$(function() {
    var panelsLoaded = { "1": false, "2": false };
    var apiInitTriggered = false;

    function tryInitApiTiles() {
        if (apiInitTriggered || !panelsLoaded["1"] || !panelsLoaded["2"]) {
            return;
        }
        apiInitTriggered = true;

        if (typeof window.initDynamicTilesFromApi === "function") {
            window.initDynamicTilesFromApi({
                roomId: 26
            }).then(function(result) {
                if (result) {
                    console.log("[dynamic-tiles-api] 26.html loaded", result);
                }
            });
        }
    }

    $("#roomsContainer").load("/app/modules/partials/room.html");

    $("#menuPanel1").load("/app/modules/partials/menu-panel-1.html", function() {
        if (typeof window.forceEnhanceVisualizerSidebar === "function") {
            window.forceEnhanceVisualizerSidebar(1);
        }
        if (typeof window.setVisualizerTilesLoading === "function") {
            window.setVisualizerTilesLoading(1);
        }
        $('.tile-type-label > img', this).each(function() {
            if (this.dataset && this.dataset.src) {
                this.src = this.dataset.src;
                delete this.dataset.src;
            }
        });
        if ($.fn.preloader) {
            $("#tiles-list-1").preloader();
        }
        panelsLoaded["1"] = true;
        tryInitApiTiles();
    });

    $("#menuPanel2").load("/app/modules/partials/menu-panel-2.html", function() {
        if (typeof window.forceEnhanceVisualizerSidebar === "function") {
            window.forceEnhanceVisualizerSidebar(2);
        }
        if (typeof window.setVisualizerTilesLoading === "function") {
            window.setVisualizerTilesLoading(2);
        }
        $('.tile-type-label > img', this).each(function() {
            if (this.dataset && this.dataset.src) {
                this.src = this.dataset.src;
                delete this.dataset.src;
            }
        });
        if ($.fn.preloader) {
            $("#tiles-list-2").preloader();
        }
        panelsLoaded["2"] = true;
        tryInitApiTiles();
    });

    $("#productModalContainer").load("/app/modules/partials/product-modal.html");
    $("#commonLayoutModalsContainer").load("/app/modules/partials/common-layout-modals.html");
});
</script>
